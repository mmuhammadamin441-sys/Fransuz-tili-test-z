<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fransuz Tili — 300 Savol Testi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --card: #16161f;
    --border: #2a2a3a;
    --accent: #c9a84c;
    --accent2: #7c5cbf;
    --text: #e8e8f0;
    --muted: #6b6b85;
    --correct-text: #5ddb8a;
    --wrong-text: #db5d5d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(124,92,191,0.08) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.06) 0%, transparent 60%);
  }
  header { text-align: center; margin: 30px 0 36px; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent) 0%, #e8c97a 50%, var(--accent2) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    letter-spacing: -1px;
  }
  header p { color: var(--muted); font-size: 0.9rem; margin-top: 8px; letter-spacing: 2px; text-transform: uppercase; }
  .progress-wrap { width: 100%; max-width: 680px; margin-bottom: 24px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 0.82rem; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 10px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .score-strip { display: flex; gap: 16px; margin-bottom: 24px; }
  .score-pill { padding: 6px 18px; border-radius: 30px; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.5px; }
  .score-pill.c { background: rgba(93,219,138,0.1); color: var(--correct-text); border: 1px solid rgba(93,219,138,0.2); }
  .score-pill.w { background: rgba(219,93,93,0.1); color: var(--wrong-text); border: 1px solid rgba(219,93,93,0.2); }
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 20px;
    padding: 36px 40px; width: 100%; max-width: 680px;
    position: relative; overflow: hidden;
    animation: slideIn 0.4s cubic-bezier(.4,0,.2,1);
  }
  .card::before { content:''; position:absolute; top:0;left:0;right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent2),var(--accent),transparent); }
  @keyframes slideIn { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  .q-number { font-size: 0.75rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; font-weight: 600; margin-bottom: 14px; }
  .q-text { font-family: 'Playfair Display', serif; font-size: clamp(1rem, 2.5vw, 1.25rem); line-height: 1.6; color: var(--text); margin-bottom: 28px; font-weight: 700; }
  .q-text em { color: var(--accent); font-style: italic; }
  .options { display: flex; flex-direction: column; gap: 11px; }
  .option {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px; border: 1px solid var(--border); border-radius: 12px;
    cursor: pointer; background: transparent; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 0.97rem;
    text-align: left; transition: all 0.2s ease; width: 100%;
  }
  .option:hover:not(:disabled) { border-color: var(--accent2); background: rgba(124,92,191,0.08); transform: translateX(4px); }
  .option .letter {
    width: 30px; height: 30px; border-radius: 8px; background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.82rem; flex-shrink: 0; transition: all 0.2s; color: var(--muted);
  }
  .option:hover:not(:disabled) .letter { background: var(--accent2); color: white; }
  .option.correct { border-color: var(--correct-text); background: rgba(93,219,138,0.07); animation: pulse 0.4s ease; }
  .option.correct .letter { background: var(--correct-text); color: #0d0d14; }
  .option.wrong { border-color: var(--wrong-text); background: rgba(219,93,93,0.07); animation: shake 0.4s ease; }
  .option.wrong .letter { background: var(--wrong-text); color: white; }
  @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.02)} 100%{transform:scale(1)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} }
  .feedback { margin-top: 18px; padding: 13px 16px; border-radius: 10px; font-size: 0.88rem; font-weight: 500; display: none; align-items: center; gap: 10px; }
  .feedback.show { display: flex; }
  .feedback.cf { background: rgba(93,219,138,0.1); color: var(--correct-text); border: 1px solid rgba(93,219,138,0.15); }
  .feedback.wf { background: rgba(219,93,93,0.1); color: var(--wrong-text); border: 1px solid rgba(219,93,93,0.15); }
  .next-btn { margin-top: 22px; width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg,var(--accent2),var(--accent)); color: white; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; display:none; letter-spacing:0.5px; transition:opacity 0.2s,transform 0.2s; }
  .next-btn:hover { opacity:0.9; transform:translateY(-2px); }
  .next-btn.show { display:block; animation:fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .result-screen { text-align:center; padding:50px 40px; display:none; }
  .result-screen.show { display:block; animation:slideIn 0.5s ease; }
  .result-emoji { font-size:4rem; margin-bottom:20px; }
  .result-title { font-family:'Playfair Display',serif; font-size:2rem; font-weight:900; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:10px; }
  .result-sub { color:var(--muted); font-size:1rem; margin-bottom:28px; }
  .result-big { font-size:4.5rem; font-weight:700; font-family:'Playfair Display',serif; color:var(--accent); line-height:1; margin-bottom:8px; }
  .result-label { color:var(--muted); font-size:0.9rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:32px; }
  .restart-btn { padding:15px 44px; border-radius:12px; border:none; background:linear-gradient(135deg,var(--accent2),var(--accent)); color:white; font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; transition:opacity 0.2s,transform 0.2s; }
  .restart-btn:hover { opacity:0.9; transform:translateY(-2px); }
  @media(max-width:520px) { .card{padding:22px 16px;} .option{padding:12px 12px;font-size:0.9rem;} }
</style>
</head>

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

let questions, cur, correct, wrong, answered;
const LT = ['A','B','C','D'];

function init(){
  questions = shuffle([...ALL]).slice(0,40);
  cur=0; correct=0; wrong=0; answered=false;
  document.getElementById('rs').className='card result-screen';
  document.getElementById('quiz-card').style.display='';
  render();
}

function render(){
  const q=questions[cur];
  answered=false;
  document.getElementById('qn').textContent=`Savol ${String(cur+1).padStart(2,'0')}`;
  document.getElementById('qc').textContent=`Savol ${cur+1} / ${questions.length}`;
  document.getElementById('pct').textContent=Math.round((cur/questions.length)*100)+'%';
  document.getElementById('pf').style.width=((cur/questions.length)*100)+'%';
  document.getElementById('qt').innerHTML=q.q;
  const opts=shuffle([...q.o]);
  const c=document.getElementById('opts');
  c.innerHTML='';
  opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='option';
    b.innerHTML=`<span class="letter">${LT[i]}</span><span>${o}</span>`;
    b.onclick=()=>select(b,o,q.a,opts);
    c.appendChild(b);
  });
  const fb=document.getElementById('fb');
  fb.className='feedback';
  fb.textContent='';
  document.getElementById('nb').className='next-btn';
  document.getElementById('cc').textContent=correct;
  document.getElementById('wc').textContent=wrong;
}

function select(btn,chosen,answer){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.option').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  if(chosen===answer){
    btn.classList.add('correct');
    correct++;
    fb.className='feedback cf show';
    fb.innerHTML='✓ To\'g\'ri javob!';
  } else {
    btn.classList.add('wrong');
    wrong++;
    document.querySelectorAll('.option').forEach(b=>{
      if(b.querySelector('span:last-child').textContent===answer) b.classList.add('correct');
    });
    fb.className='feedback wf show';
    fb.innerHTML=`✗ Xato! To'g'ri: <strong>${answer}</strong>`;
  }
  document.getElementById('cc').textContent=correct;
  document.getElementById('wc').textContent=wrong;
  document.getElementById('nb').className='next-btn show';
}

function next(){
  cur++;
  if(cur>=questions.length){showResult();}
  else{
    const card=document.getElementById('quiz-card');
    card.style.animation='none';
    card.offsetHeight;
    card.style.animation='';
    render();
  }
}

function showResult(){
  document.getElementById('quiz-card').style.display='none';
  document.getElementById('pf').style.width='100%';
  document.getElementById('pct').textContent='100%';
  const pct=Math.round((correct/questions.length)*100);
  document.getElementById('rs').className='card result-screen show';
  document.getElementById('rscore').textContent=correct+' / '+questions.length;
  document.getElementById('rlabel').textContent=pct+"% to'g'ri javob";
  document.getElementById('re').textContent=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'📚':'💪';
}

function restart(){init();}
init();
</script>
